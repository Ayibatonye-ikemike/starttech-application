name: Backend Delivery
on:
  push:
    branches: [ main ]
    paths: [ 'Server/**' ]
jobs:
  test-build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache-dependency-path: Server/MuchToDo/go.sum
      - name: Test Suite
        run: cd Server/MuchToDo && go test ./... -v
      - name: Authenticate Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish Container Artifact
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/much-to-do-backend:latest ./Server/MuchToDo
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/much-to-do-backend:latest
  trigger-deploy:
    needs: test-build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy Update
        run: |
          chmod +x scripts/deploy-backend.sh
          ./scripts/deploy-backend.sh
      - name: Health Verification
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh ${{ secrets.ALB_PRODUCTION_DNS }}
